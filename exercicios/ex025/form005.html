<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <title>Formulário</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Formulário</h1>                  
    <form action="cadastro.html" method="get" autocomplete="on">
        <fieldset>
            <legend>Sexo</legend>

            <input type="radio" name="sexo" id="isexomas">
            <label for="isexomas">Masculino</label><br>

            <input type="radio" name="sexo" id="isexofem" checked>
            <label for="isexofem">Feminino</label>

        </fieldset>
        <fieldset>
            <legend>Espotes Favoritos</legend>

            <input type="checkbox" name="espbas" id="iespbas" checked>
            <label for="iespbas">Basquete</label> <br>

            <input type="checkbox" name="esofut" id="iespfut" checked>
            <label for="iespfut">Futebol</label> <br>

            <input type="checkbox" name="espnat" id="iespnat">
            <label for="iespnat">Natação</label> <br>

            <input type="checkbox" name="espten" id="iespten">
            <label for="iespten">Tênis</label> <br>
        </fieldset>



        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
