<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em varios dispositivo diferentes ou siplesmente aumente o tamanhpo do navegador.</p>
    <picture>
        <source media="(max-width:750px)" srcset="imagem-text/imagem-500.png" type="image/png">
        <source media="(max-width:1050px)" srcset="imagem-text/imagem-700.png" type="image/png">
        <source media="(max-width:1550px)" srcset="imagem-text/imagem-1000.png" type="image/png">
        <source media="(max-width:2000px)" srcset="imagem-text/imagem-1500.png" type="image/png">
        <img src="imagem-text/imagem-padrao.png" alt="imagem flexivel">
    </picture>

</body>
</html>
