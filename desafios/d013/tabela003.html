<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            margin:auto;
            margin-bottom: 50px;
            border-spacing: 3px;
        }

        td {
            border-collapse: separate;
            border: 1px solid black;
            text-align: center;
            border-radius: 20px;
            font-size: 1.5em;
            font-weight: bolder;
        }

        td:hover {
            background-color: #e10d0d;
        }
        
        .num {
            height: 90px;
            width: 80px;
        }
    </style>
</head>
<body>
      <h1>Mesclagem de Células</h1>
      <table>
        <tr>
            <td class="num">Num Lock</td>
            <td class="num">/</td>
            <td class="num">*</td>
            <td class="num">-</td>
        </tr>
        <tr>
            <td class="num">7</td>
            <td class="num">8</td>
            <td class="num">9</td>
            <td rowspan="2">+</td>
        </tr>
        <tr>
            <td class="num">4</td>
            <td class="num">5</td>
            <td class="num">6</td>
        </tr>
        <tr>
            <td class="num">1</td>
            <td class="num">2</td>
            <td class="num">3</td>
            <td rowspan="2">Enter</td>
        </tr>
        <tr>
            <td colspan="2">0</td>
            <td class="num">,</td>
        </tr>
      </table>
</body>
</html>
