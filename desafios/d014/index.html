<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de Notas</title>
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 400px;
        }

        thead {
            background-color: #00000086;
            color: white;
        }

        .media {
            text-align: left;
            background-color: #00000086;
            color: white;
        }

        .media-valor {
            background-color: #00000086;
            color: white;
        }

        td {
            text-align: center;
        }

        th, td {
            border: 1px solid rgb(3, 3, 90);
            padding: 5px;
        }


        .disciplina {
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>Desafio de fazer tabela de notas</h1>
    <!-- table>th*5>th+tr*4 -->
     <table>
        <thead>
            <tr>
                <th scope="rowgroup" rowspan="2">Área</th>
                <th scope="rowgroup" rowspan="2">Disciplinas</th>
                <th scope="colgroup" colspan="2">Notas</th>
                <th scope="rowgroup" rowspan="2">Média</th>
            </tr>
            <tr>
                <th scope="col">Nota 1</th>
                <th scope="col">Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="rowgroup" rowspan="4">Exatas </th>
                <td class="disciplina">Matematica</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="disciplina">Fisica</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="disciplina">Quimica</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="disciplina">Biologia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <th  scope="row" colspan="4" class="media">Média de Exatas</th>
                <td class="media-valor">0.0</td>
            </tr>
            <tr>
                <th scope="rowgroup" rowspan="2"> Humanas</th>
                <td class="disciplina">Historia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="disciplina">Geografia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <th scope="row" colspan="4" class="media">Média de Humanas</th>
                <td class="media-valor">0.0</td>
            </tr>
        </tbody>
     </table>
</body>
</html>
